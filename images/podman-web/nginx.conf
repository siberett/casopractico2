server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/podman-web.crt;
    ssl_certificate_key /etc/nginx/certs/podman-web.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        auth_basic "Caso Practico 2";
        auth_basic_user_file /etc/nginx/.htpasswd;
        try_files $uri $uri/ =404;
    }
}
